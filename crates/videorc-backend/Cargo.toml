[package]
name = "videorc-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
axum = { version = "0.8", features = ["ws"] }
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
libc = "0.2"
reqwest = { version = "0.12", features = ["json", "multipart", "rustls-tls"], default-features = false }
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.48", features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1.19", features = ["v4"] }

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.6.1"
coreaudio = { package = "coreaudio-rs", version = "0.14.2" }
objc2-av-foundation = { version = "0.3.2", default-features = false, features = ["AVCaptureDevice", "AVMediaFormat", "objc2-core-media"] }
objc2-core-media = { version = "0.3.2", default-features = false, features = ["CMFormatDescription", "objc2"] }
objc2-foundation = { version = "0.3.2", default-features = false, features = ["std", "NSArray", "NSError", "NSString"] }
objc2-screen-capture-kit = { version = "0.3.2", default-features = false, features = ["SCShareableContent", "block2", "libc", "objc2-core-foundation", "objc2-core-graphics"] }
