name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  local-gates:
    name: Local acceptance gates
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.6.0'
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure smoke-test FFmpeg
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

      - name: Format
        run: cargo fmt --check --all

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Build desktop app
        run: pnpm build

      - name: Backend tests
        run: cargo test -p videorc-backend

      - name: Backend clippy
        run: cargo clippy -p videorc-backend -- -D warnings

      - name: OAuth loopback smoke
        timeout-minutes: 5
        run: pnpm smoke:oauth

      - name: OAuth guard smoke
        timeout-minutes: 5
        run: pnpm smoke:oauth-guards

      - name: Source persistence smoke
        run: pnpm smoke:sources

      - name: Start labels smoke
        run: pnpm smoke:start-labels

      - name: Streaming secrets smoke
        run: pnpm smoke:streaming-secrets

      - name: Platform lifecycle smoke
        run: pnpm smoke:platform-lifecycle

      - name: Screens switching smoke
        timeout-minutes: 10
        run: pnpm smoke:screens

      - name: Multistream smoke
        timeout-minutes: 10
        run: pnpm smoke:multistream

      - name: Dev app smoke
        timeout-minutes: 10
        run: pnpm smoke:dev

      - name: Provider readiness smoke
        run: pnpm smoke:provider-readiness
