# TEMPORARY PR-ONLY WORKFLOW.
# Remove this file after the hosted calibration JSON artifacts are downloaded.
name: 'TEMPORARY: calibrate hosted macOS release budget'

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: temporary-macos-release-calibration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  calibrate:
    name: Three-run hosted packaged calibration
    if: ${{ github.head_ref == 'codex/macos-performance-memory-hardening' }}
    runs-on: macos-15
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VIDEORC_PERF_APP_EXECUTABLE: apps/desktop/release/mac-arm64/Videorc.app/Contents/MacOS/Videorc
      VIDEORC_PERF_ARTIFACT_DIR: docs/acceptance/artifacts/performance/hosted-macos-release-calibration
      VIDEORC_PERF_EXPECT_BUILD_MODE: packaged
      VIDEORC_PERF_HARDWARE_CLASS: github-hosted-macos-15-arm64-standard

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.6.0'
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package unsigned app
        run: pnpm package:desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Prime macOS capture, Electron, and GPU caches outside the three-run
      # calibration set so a cold hosted runner cannot make run 1 incomparable.
      - name: Prime detached native-preview workload
        env:
          VIDEORC_PERF_MAX_INTERVAL_P95_MS: '30'
          VIDEORC_PERF_MIN_PRESENT_FPS: '58'
        run: >-
          pnpm perf:scenario --scenario detached-native-preview --report-only
          --warmup-seconds 60
          --measurement-seconds 120
          --output "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-primer.json"

      # This is intentionally not an active-budget run. The only numeric
      # performance limits are the established cross-machine cadence floor.
      - name: Run exactly three sequential detached native-preview scenarios
        id: scenarios
        continue-on-error: true
        timeout-minutes: 45
        env:
          VIDEORC_PERF_MAX_INTERVAL_P95_MS: '30'
          VIDEORC_PERF_MIN_PRESENT_FPS: '58'
        run: |
          failed=0
          for calibration_run in 1 2 3; do
            if ! pnpm perf:scenario --scenario detached-native-preview --gate \
              --warmup-seconds 60 \
              --measurement-seconds 600 \
              --output "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-run-${calibration_run}.json"; then
              failed=1
            fi
          done
          exit "$failed"

      - name: Aggregate calibration and unenforced candidate
        id: aggregate
        if: always() && steps.scenarios.outcome == 'success'
        continue-on-error: true
        run: >-
          pnpm perf:calibrate
          --output "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-calibration.json"
          --budget-output "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-budget-candidate.json"
          "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-run-1.child.json"
          "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-run-2.child.json"
          "$VIDEORC_PERF_ARTIFACT_DIR/detached-native-preview-run-3.child.json"

      - name: Upload hosted calibration JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temporary-hosted-macos-release-calibration-${{ github.run_id }}
          path: docs/acceptance/artifacts/performance/hosted-macos-release-calibration/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce complete three-run calibration
        if: always()
        run: |
          test "${{ steps.scenarios.outcome }}" = 'success'
          test "${{ steps.aggregate.outcome }}" = 'success'
